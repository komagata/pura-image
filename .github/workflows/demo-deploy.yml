name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - ".github/workflows/demo-deploy.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: demo/build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Build ruby.wasm (bundles pura-* gems)
        working-directory: demo/build
        run: |
          mkdir -p ../public
          bundle exec rbwasm build --ruby-version 3.4 -o ../public/ruby.wasm

      - name: Install npm dependencies
        working-directory: demo
        run: npm ci

      - name: Vite build
        working-directory: demo
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
